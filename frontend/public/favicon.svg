  <!-- Pump base -->
  <rect x="12" y="48" width="28" height="4" rx="2" fill="white"/>
  <!-- Dollar lines on screen -->
  <line x1="20" y1="26" x2="32" y2="26" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="29" x2="28" y2="29" stroke="white" stroke-width="1.2" opacity="0.7"/>
