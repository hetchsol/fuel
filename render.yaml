# Live services (created in the Render dashboard):
#   Backend API : https://fuel-api-wpdj.onrender.com
#   Frontend    : https://fuel-frontend-4wef.onrender.com   <-- the real frontend
# NOTE: https://fuel-frontend.onrender.com is an OLD, unrelated service and is NOT used.
# CORS_ORIGINS / BACKEND_URL below must reference the live URLs above.
services:
  - type: web
    name: fuel-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PORT
        value: "10000"
      - key: CORS_ORIGINS
        value: "https://fuel-frontend-4wef.onrender.com"

  - type: web
    name: fuel-frontend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    rootDir: frontend
    envVars:
      - key: PORT
        value: "10000"
      - key: BACKEND_URL
        value: "https://fuel-api-wpdj.onrender.com"
